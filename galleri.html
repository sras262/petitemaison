<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>Galleri - Petite Maison</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    font-family:Georgia, serif;
    background:#faf7f1;
    color:#2f2a23;
}

nav{
    background:#6f7650;
    padding:18px;
    text-align:center;
}

nav a{
    color:white;
    text-decoration:none;
    margin:0 15px;
}

header{
    text-align:center;
    padding:60px 20px;
}

h1{
    font-family:"Playfair Display",serif;
    font-size:72px;
    font-weight:normal;
    margin-bottom:10px;
}

.subtitle{
    color:#666;
}

.gallery{
    max-width:1200px;
    margin:auto;
    padding:20px;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
    gap:25px;
}

.gallery img{
    width:100%;
    height:280px;
    object-fit:cover;
    border-radius:12px;
    transition:0.3s;
}

.gallery img:hover{
    transform:scale(1.02);
}

.caption{
    text-align:center;
    margin-top:8px;
}

.button{
    display:inline-block;
    background:#6f7650;
    color:white;
    text-decoration:none;
    padding:14px 30px;
    border-radius:28px;
}

footer{
    text-align:center;
    padding:40px;
    color:#666;
}
</style>
</head>

<body>

<nav>
<a href="index.html">Forside</a>
<a href="galleri.html">Galleri</a>
<a href="index.html#kalender">Kalender</a>
<a href="index.html#kontakt">Kontakt</a>
</nav>

<header>
<h1>Galleri</h1>
<p class="subtitle">
Stemninger fra Petite Maison og Revin
</p>
</header>

<div class="gallery">

<div>
<img src="hus.jpg" alt="Petite Maison">
<div class="caption">Petite Maison</div>
</div>

<div>
<img src="udsigt.jpg" alt="Udsigt">
<div class="caption">Udsigt over området</div>
</div>

<div>
<img src="bystemning.jpg" alt="Revin">
<div class="caption">Hyggelig bystemning i Revin</div>
</div>

</div>

<div style="text-align:center;padding:40px 20px;">
  <a href="index.html" class="button">
    ← Tilbage til forsiden
  </a>
</div>

<footer>
Petite Maison · Revin · Ardennerne · Frankrig
</footer>

</body>
</html>
